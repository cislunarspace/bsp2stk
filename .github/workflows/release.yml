name: Release

on:
  push:
    tags:
      - 'v*'

env:
  PYINSTALLER_VERSION: '6.19.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Verify version matches tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF_NAME#v}"
          PY_VER="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$TAG_VER" != "$PY_VER" ]; then
            echo "::error::Tag version ($TAG_VER) does not match pyproject.toml version ($PY_VER)"
            exit 1
          fi

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e .

      - name: Install PyInstaller
        run: pip install "pyinstaller==${{ env.PYINSTALLER_VERSION }}"

      - name: Build executable
        run: pyinstaller pyinstaller/bsp2stk.spec --distpath dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/bsp2stk.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Verify version matches tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF_NAME#v}"
          PY_VER="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$TAG_VER" != "$PY_VER" ]; then
            echo "::error::Tag version ($TAG_VER) does not match pyproject.toml version ($PY_VER)"
            exit 1
          fi

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e .

      - name: Install PyInstaller
        run: pip install "pyinstaller==${{ env.PYINSTALLER_VERSION }}"

      - name: Build Linux executable
        run: |
          pyinstaller --onefile --name bsp2stk src/bsp2stk/__main__.py
          tar -czvf dist/bsp2stk-linux.tar.gz dist/bsp2stk

      - name: Build deb
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p debdist/usr/bin
          mkdir -p debdist/usr/share/applications
          mkdir -p debdist/usr/share/doc/bsp2stk
          mkdir -p debdist/DEBIAN
          cp dist/bsp2stk debdist/usr/bin/bsp2stk
          {
            echo "Package: bsp2stk"
            echo "Version: ${VERSION}"
            echo "Section: science"
            echo "Priority: optional"
            echo "Architecture: amd64"
            echo "Maintainer: bsp2stk"
            echo "Description: BSP to STK ephemeris converter"
          } > debdist/DEBIAN/control
          cat > debdist/usr/share/applications/bsp2stk.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=bsp2stk
          Comment=BSP to STK ephemeris converter
          Exec=bsp2stk
          Icon=bsp2stk
          Terminal=true
          Type=Application
          DESKTOP
          dpkg-deb --build debdist dist/bsp2stk.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/bsp2stk-linux.tar.gz
            dist/bsp2stk.deb

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/linux

      - uses: actions/checkout@v4

      - name: Download test BSP
        run: |
          mkdir -p artifacts
          cp bsp/Voyager_1_merged.bsp artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/bsp2stk.exe
            artifacts/linux/bsp2stk-linux.tar.gz
            artifacts/linux/bsp2stk.deb
            artifacts/Voyager_1_merged.bsp
          draft: true
